<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZONEX - Mind-Bending Puzzles & Mysteries</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 0;
            transition: all 0.3s ease;
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00ff88, #00d4ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
            padding: 0.5rem 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .header-stats {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: #00ff88;
            margin: 3px 0;
            transition: 0.3s;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 80%, rgba(0, 255, 136, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 0, 255, 0.1) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            33% {
                transform: translateY(-20px) rotate(120deg);
            }

            66% {
                transform: translateY(-10px) rotate(240deg);
            }
        }

        .hero h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(4rem, 10vw, 7rem);
            margin-bottom: 1.5rem;
            animation: glow 2s ease-in-out infinite alternate;
            letter-spacing: 5px;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88, 0 0 60px #00d4ff;
            }

            to {
                text-shadow: 0 0 30px #00ff88, 0 0 50px #00d4ff, 0 0 70px #ff00ff;
            }
        }

        .hero .tagline {
            font-size: clamp(1.3rem, 4vw, 2rem);
            margin-bottom: 2.5rem;
            opacity: 0.95;
            max-width: 800px;
            padding: 0 1rem;
        }

        .hero-buttons {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .play-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            color: #000;
            padding: 1.3rem 3.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 15px 35px rgba(0, 255, 136, 0.4);
            animation: pulse 2s infinite;
            position: relative;
            overflow: hidden;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .play-btn:hover::before {
            left: 100%;
        }

        .play-btn:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 45px rgba(0, 255, 136, 0.6);
        }

        .learn-more-btn {
            background: transparent;
            color: #ffffff;
            border: 2px solid #00ff88;
            padding: 1.1rem 3rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .learn-more-btn:hover {
            background: #00ff88;
            color: #000;
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 255, 136, 0.4);
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 15px 35px rgba(0, 255, 136, 0.4);
            }

            50% {
                box-shadow: 0 15px 35px rgba(0, 255, 136, 0.7);
            }

            100% {
                box-shadow: 0 15px 35px rgba(0, 255, 136, 0.4);
            }
        }

        /* Stats Section */
        .stats {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 3rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 1.5rem 3rem;
            border-radius: 50px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
        }

        /* Sections */
        section {
            padding: 6rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        h2 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            text-align: center;
            margin-bottom: 4rem;
            background: linear-gradient(45deg, #00ff88, #00d4ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            border-radius: 2px;
        }

        /* About Section */
        .about {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            padding: 4rem;
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 136, 0.2);
            margin-bottom: 2rem;
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 4rem;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .about-image {
            position: relative;
        }

        .about-image::before {
            content: '';
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.1;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .about-image i {
            font-size: 8rem;
            color: #00ff88;
            position: relative;
            z-index: 2;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-20px);
            }

            60% {
                transform: translateY(-10px);
            }
        }

        .about-text h3 {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: #00ff88;
        }

        .about-text p {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .feature {
            text-align: center;
            padding: 2rem;
        }

        .feature i {
            font-size: 3rem;
            color: #00d4ff;
            margin-bottom: 1rem;
        }

        /* Featured Riddles */
        .riddles {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 4rem;
            backdrop-filter: blur(10px);
        }

        .riddles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 2.5rem;
            margin-top: 3rem;
        }

        .riddle-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 2.5rem;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 212, 255, 0.3);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .riddle-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.15), transparent);
            transition: left 0.6s;
        }

        .riddle-card:hover::before {
            left: 100%;
        }

        .riddle-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: #00ff88;
            box-shadow: 0 25px 50px rgba(0, 255, 136, 0.25);
        }

        .riddle-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .riddle-number {
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            color: #000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .riddle-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.6rem;
            color: #00ff88;
            flex: 1;
        }

        .riddle-text {
            opacity: 0.9;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        .riddle-answer {
            background: rgba(0, 255, 136, 0.15);
            padding: 1.5rem;
            border-radius: 15px;
            font-weight: 600;
            border-left: 5px solid #00ff88;
            transition: all 0.3s ease;
        }

        .riddle-card:hover .riddle-answer {
            background: rgba(0, 255, 136, 0.25);
        }

        /* Games Section */
        .games {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            padding: 4rem;
            text-align: center;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 3rem;
            margin-top: 3rem;
        }

        .game-card {
            background: rgba(0, 212, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
        }

        .game-card:hover {
            border-color: #00d4ff;
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.3);
        }

        .game-card i {
            font-size: 4rem;
            color: #00d4ff;
            margin-bottom: 1.5rem;
        }

        .game-card h3 {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #00d4ff;
        }

        /* CTA Section */
        .cta {
            text-align: center;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(255, 0, 255, 0.15));
            border-radius: 30px;
            padding: 5rem 3rem;
            margin: 4rem 0;
            position: relative;
            overflow: hidden;
        }

        .cta::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%);
            animation: rotate 15s linear infinite;
        }

        .cta-content {
            position: relative;
            z-index: 2;
        }

        .cta h2 {
            margin-bottom: 1.5rem;
        }

        .cta p {
            font-size: 1.3rem;
            margin-bottom: 2.5rem;
            opacity: 0.95;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-buttons {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .insta-btn {
            display: inline-flex;
            align-items: center
